<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Resources — PUC HUB</title>
    <link rel="icon" type="image/png" href="assets/p.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Poppins',sans-serif;background:radial-gradient(circle at top,#2b180f 0%,#0c0908 100%);background-attachment:fixed;color:#ececec;min-height:100vh;}

        .ai-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(43,24,15,0.95);border-bottom:1px solid rgba(243,156,18,0.25);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
        .nav-logo{display:flex;align-items:center;gap:10px;}
        .nav-logo img{width:36px;height:36px;border-radius:50%;border:2px solid #f39c12;}
        .nav-logo span{font-size:18px;font-weight:700;color:#f39c12;}
        .nav-tag{font-size:11px;color:#e67e22;letter-spacing:1px;margin-left:4px;}
        .nav-actions{display:flex;gap:8px;}
        .nav-btn{padding:8px 16px;background:transparent;border:1px solid rgba(243,156,18,0.35);border-radius:8px;color:#ccc;text-decoration:none;font-size:13px;cursor:pointer;transition:.2s;font-family:'Poppins',sans-serif;}
        .nav-btn:hover{border-color:#f39c12;color:#f39c12;}

        .page{max-width:1100px;margin:0 auto;padding:36px 20px 70px;}
        .page-title{font-size:30px;font-weight:800;color:#f39c12;margin-bottom:6px;}
        .page-sub{font-size:14px;color:#a08060;margin-bottom:28px;}

        /* SEARCH */
        .search-row{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
        .search-row input{flex:1;min-width:200px;padding:13px 16px;background:rgba(12,9,8,0.8);border:1px solid rgba(243,156,18,0.2);border-radius:11px;color:#ececec;font-size:14px;outline:none;font-family:'Poppins',sans-serif;}
        .search-row input:focus{border-color:#f39c12;}
        .search-row select{padding:13px 16px;background:rgba(12,9,8,0.8);border:1px solid rgba(243,156,18,0.2);border-radius:11px;color:#ccc;font-size:14px;outline:none;font-family:'Poppins',sans-serif;cursor:pointer;}
        .search-row select option{background:#1a0f07;}

        /* CATEGORY HEADER */
        .cat-header{display:flex;align-items:center;gap:14px;margin-bottom:18px;margin-top:36px;padding:16px 22px;background:rgba(43,24,15,0.6);border:1px solid rgba(243,156,18,0.22);border-radius:14px;backdrop-filter:blur(8px);}
        .cat-header-left{flex:1;}
        .cat-title{font-size:18px;font-weight:800;color:#f39c12;}
        .cat-sub{font-size:13px;color:#a08060;margin-top:2px;}
        .cat-count{font-size:13px;color:#6b5040;font-weight:600;flex-shrink:0;}

        /* BOOKS GRID */
        .books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:8px;}
        .book-card{display:flex;align-items:center;gap:14px;padding:16px 18px;background:rgba(43,24,15,0.5);border:1px solid rgba(243,156,18,0.18);border-radius:13px;text-decoration:none;transition:.2s;backdrop-filter:blur(5px);}
        .book-card:hover{border-color:rgba(243,156,18,0.5);background:rgba(43,24,15,0.7);transform:translateX(4px);}
        .book-icon{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;font-weight:700;}
        .icon-cs{background:rgba(52,152,219,0.12);color:#3498db;border:1px solid rgba(52,152,219,0.25);}
        .icon-math{background:rgba(243,156,18,0.12);color:#f39c12;border:1px solid rgba(243,156,18,0.25);}
        .icon-ds{background:rgba(155,89,182,0.12);color:#9b59b6;border:1px solid rgba(155,89,182,0.25);}
        .icon-net{background:rgba(231,76,60,0.12);color:#e74c3c;border:1px solid rgba(231,76,60,0.25);}
        .icon-lit{background:rgba(39,174,96,0.12);color:#27ae60;border:1px solid rgba(39,174,96,0.25);}
        .icon-ai{background:rgba(230,126,34,0.12);color:#e67e22;border:1px solid rgba(230,126,34,0.25);}
        .icon-se{background:rgba(26,188,156,0.12);color:#1abc9c;border:1px solid rgba(26,188,156,0.25);}
        .book-info{flex:1;min-width:0;}
        .book-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .book-auth{font-size:12px;color:#a08060;}
        .book-tag{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:700;flex-shrink:0;background:rgba(243,156,18,0.1);color:#f39c12;border:1px solid rgba(243,156,18,0.25);}

        .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(243,156,18,0.15),transparent);margin:32px 0;}
        .no-results{text-align:center;padding:50px;color:#6b5040;font-size:15px;}
    </style>
</head>
<body>
<nav id="puc-navbar"></nav>

<div class="page">
    <div class="page-title">Learning Resources</div>
    <div class="page-sub">Free PDF books and references for CSE students — click any book to open.</div>

    <div class="search-row">
        <input id="searchInput" placeholder="Search by title or author..." oninput="filterBooks()">
        <select id="catFilter" onchange="filterBooks()">
            <option value="">All Categories</option>
            <option value="CSE Core">CSE Core</option>
            <option value="Data Structures">Data Structures</option>
            <option value="Math & Logic">Math & Logic</option>
            <option value="Networking">Networking</option>
            <option value="AI & Machine Learning">AI & Machine Learning</option>
            <option value="Software Engineering">Software Engineering</option>
            <option value="Literature">Literature</option>
        </select>
    </div>

    <div id="booksContainer"></div>
</div>

<script>
if (localStorage.getItem('isLoggedIn') !== 'true') { alert('Please login first!'); window.location.href = 'login.html'; }

const BOOKS = [
    // CSE Core
    { title:'The C Programming Language', author:'Kernighan & Ritchie', cat:'CSE Core', icon:'icon-cs', letter:'C', url:'https://www.dipmat.univpm.it/~demeio/public/the_c_programming_language_2.pdf' },
    { title:'Introduction to Algorithms (CLRS)', author:'Cormen, Leiserson, Rivest, Stein', cat:'CSE Core', icon:'icon-ds', letter:'A', url:'https://mitpress.mit.edu/9780262046305/introduction-to-algorithms/' },
    { title:'Head First Java', author:'Kathy Sierra & Bert Bates', cat:'CSE Core', icon:'icon-cs', letter:'J', url:'https://www.oreilly.com/library/view/head-first-java/9781492091646/' },
    { title:'Python Crash Course', author:'Eric Matthes', cat:'CSE Core', icon:'icon-cs', letter:'Py', url:'https://nostarch.com/pythoncrashcourse3' },
    { title:'Clean Code', author:'Robert C. Martin', cat:'CSE Core', icon:'icon-cs', letter:'CC', url:'https://www.oreilly.com/library/view/clean-code-a/9780136083238/' },
    { title:'Operating System Concepts', author:'Silberschatz, Galvin, Gagne', cat:'CSE Core', icon:'icon-cs', letter:'OS', url:'https://www.os-book.com/OS10/' },
    { title:'Database System Concepts', author:'Silberschatz, Korth, Sudarshan', cat:'CSE Core', icon:'icon-cs', letter:'DB', url:'https://db-book.com/' },
    { title:'Computer Organization & Architecture', author:'William Stallings', cat:'CSE Core', icon:'icon-cs', letter:'CO', url:'https://www.pearson.com/en-us/subject-catalog/p/computer-organization-and-architecture/P200000003267' },
    { title:'Programming in C', author:'Dennis Ritchie', cat:'CSE Core', icon:'icon-cs', letter:'C', url:'https://www.dipmat.univpm.it/~demeio/public/the_c_programming_language_2.pdf' },
    { title:'Automate the Boring Stuff with Python', author:'Al Sweigart', cat:'CSE Core', icon:'icon-cs', letter:'Py', url:'https://automatetheboringstuff.com/' },
    { title:'Learn Python the Hard Way', author:'Zed A. Shaw', cat:'CSE Core', icon:'icon-cs', letter:'Py', url:'https://learnpythonthehardway.org/' },

    // Data Structures
    { title:'Data Structures & Algorithms in Python', author:'Goodrich, Tamassia, Goldwasser', cat:'Data Structures', icon:'icon-ds', letter:'DS', url:'https://www.wiley.com/en-us/Data+Structures+and+Algorithms+in+Python-p-9781118290279' },
    { title:"Competitive Programmer's Handbook", author:'Antti Laaksonen', cat:'Data Structures', icon:'icon-ds', letter:'CP', url:'https://cses.fi/book/book.pdf' },
    { title:'The Algorithm Design Manual', author:'Steven Skiena', cat:'Data Structures', icon:'icon-ds', letter:'Al', url:'https://www.algorist.com/' },
    { title:'Cracking the Coding Interview', author:'Gayle Laakmann McDowell', cat:'Data Structures', icon:'icon-ds', letter:'CI', url:'https://www.crackingthecodinginterview.com/' },
    { title:'Grokking Algorithms', author:'Aditya Bhargava', cat:'Data Structures', icon:'icon-ds', letter:'GA', url:'https://www.manning.com/books/grokking-algorithms' },
    { title:'Data Structures in C', author:'Noel Kalicharan', cat:'Data Structures', icon:'icon-ds', letter:'DS', url:'https://www.pearson.com/' },
    { title:'Algorithms Unlocked', author:'Thomas H. Cormen', cat:'Data Structures', icon:'icon-ds', letter:'AU', url:'https://mitpress.mit.edu/' },

    // Math & Logic
    { title:'Discrete Mathematics & Applications', author:'Kenneth H. Rosen', cat:'Math & Logic', icon:'icon-math', letter:'DM', url:'https://www.mheducation.com/highered/product/discrete-mathematics-its-applications-rosen/M9781260091991.html' },
    { title:'Linear Algebra Done Right', author:'Sheldon Axler', cat:'Math & Logic', icon:'icon-math', letter:'LA', url:'https://linear.axler.net/' },
    { title:'Calculus: Early Transcendentals', author:'James Stewart', cat:'Math & Logic', icon:'icon-math', letter:'Ca', url:'https://www.cengage.com/' },
    { title:'Introduction to Probability', author:'Blitzstein & Hwang', cat:'Math & Logic', icon:'icon-math', letter:'Pr', url:'https://projects.iq.harvard.edu/stat110/home' },
    { title:'Concrete Mathematics', author:'Graham, Knuth, Patashnik', cat:'Math & Logic', icon:'icon-math', letter:'CM', url:'https://www.pearson.com/' },
    { title:'How to Prove It', author:'Daniel J. Velleman', cat:'Math & Logic', icon:'icon-math', letter:'HP', url:'https://www.cambridge.org/' },
    { title:'Mathematical Thinking', author:'Keith Devlin', cat:'Math & Logic', icon:'icon-math', letter:'MT', url:'https://coursera.org/' },

    // Networking
    { title:'Computer Networks', author:'Andrew S. Tanenbaum', cat:'Networking', icon:'icon-net', letter:'CN', url:'https://www.pearson.com/en-us/subject-catalog/p/computer-networks/P200000003235' },
    { title:'TCP/IP Illustrated', author:'W. Richard Stevens', cat:'Networking', icon:'icon-net', letter:'TC', url:'https://www.oreilly.com/library/view/tcpip-illustrated-volume/9780132808200/' },
    { title:'Computer Networking: Top-Down Approach', author:'Kurose & Ross', cat:'Networking', icon:'icon-net', letter:'CN', url:'https://www.pearson.com/en-us/subject-catalog/p/computer-networking/P200000003249' },
    { title:'Hacking: The Art of Exploitation', author:'Jon Erickson', cat:'Networking', icon:'icon-net', letter:'Ha', url:'https://nostarch.com/hacking2.htm' },
    { title:'Network Security Essentials', author:'William Stallings', cat:'Networking', icon:'icon-net', letter:'NS', url:'https://www.pearson.com/' },
    { title:'Computer Network Security', author:'Joseph Migga Kizza', cat:'Networking', icon:'icon-net', letter:'CS', url:'https://link.springer.com/' },

    // AI & Machine Learning
    { title:'Artificial Intelligence: A Modern Approach', author:'Russell & Norvig', cat:'AI & Machine Learning', icon:'icon-ai', letter:'AI', url:'https://aima.cs.berkeley.edu/' },
    { title:'Deep Learning', author:'Goodfellow, Bengio, Courville', cat:'AI & Machine Learning', icon:'icon-ai', letter:'DL', url:'https://www.deeplearningbook.org/' },
    { title:'Hands-On Machine Learning', author:'Aurélien Géron', cat:'AI & Machine Learning', icon:'icon-ai', letter:'ML', url:'https://www.oreilly.com/library/view/hands-on-machine-learning/9781492032632/' },
    { title:'Pattern Recognition & Machine Learning', author:'Christopher Bishop', cat:'AI & Machine Learning', icon:'icon-ai', letter:'PR', url:'https://www.microsoft.com/en-us/research/publication/pattern-recognition-machine-learning/' },
    { title:'Introduction to Machine Learning with Python', author:'Andreas Müller & Sarah Guido', cat:'AI & Machine Learning', icon:'icon-ai', letter:'ML', url:'https://www.oreilly.com/' },
    { title:'Mathematics for Machine Learning', author:'Deisenroth, Faisal, Ong', cat:'AI & Machine Learning', icon:'icon-ai', letter:'MML', url:'https://mml-book.github.io/' },

    // Software Engineering
    { title:'Software Engineering', author:'Ian Sommerville', cat:'Software Engineering', icon:'icon-se', letter:'SE', url:'https://iansommerville.com/software-engineering-book/' },
    { title:'The Pragmatic Programmer', author:'Andrew Hunt & David Thomas', cat:'Software Engineering', icon:'icon-se', letter:'PP', url:'https://pragprog.com/titles/tpp20/the-pragmatic-programmer-20th-anniversary-edition/' },
    { title:'Design Patterns', author:'Gang of Four (GoF)', cat:'Software Engineering', icon:'icon-se', letter:'DP', url:'https://www.oreilly.com/library/view/design-patterns-elements/0201633612/' },
    { title:'Code Complete', author:'Steve McConnell', cat:'Software Engineering', icon:'icon-se', letter:'Co', url:'https://www.microsoftpressstore.com/' },
    { title:'The Mythical Man-Month', author:'Frederick P. Brooks Jr.', cat:'Software Engineering', icon:'icon-se', letter:'MM', url:'https://www.pearson.com/' },
    { title:'Refactoring', author:'Martin Fowler', cat:'Software Engineering', icon:'icon-se', letter:'Re', url:'https://martinfowler.com/books/refactoring.html' },

    // Literature
    { title:'Gitanjali', author:'Rabindranath Tagore', cat:'Literature', icon:'icon-lit', letter:'Gi', url:'https://www.gutenberg.org/ebooks/7164' },
    { title:'Ghare Baire (The Home and the World)', author:'Rabindranath Tagore', cat:'Literature', icon:'icon-lit', letter:'GB', url:'https://www.gutenberg.org/ebooks/7166' },
    { title:'Chokher Bali', author:'Rabindranath Tagore', cat:'Literature', icon:'icon-lit', letter:'CB', url:'https://archive.org/search?query=chokher+bali+tagore' },
    { title:'Sanchayita', author:'Rabindranath Tagore', cat:'Literature', icon:'icon-lit', letter:'Sa', url:'https://archive.org/search?query=sanchayita+rabindranath' },
    { title:'Pather Dabi', author:'Sharatchandra Chattopadhyay', cat:'Literature', icon:'icon-lit', letter:'PD', url:'https://archive.org/search?query=pather+dabi+sharatchandra' },
    { title:'Devdas', author:'Sharatchandra Chattopadhyay', cat:'Literature', icon:'icon-lit', letter:'De', url:'https://www.gutenberg.org/ebooks/search/?query=devdas' },
    { title:'Shrikanta', author:'Sharatchandra Chattopadhyay', cat:'Literature', icon:'icon-lit', letter:'Sh', url:'https://archive.org/search?query=shrikanta+sharatchandra' },
    { title:'Sei Raat Er Kotha Bolte Eshechi', author:'Humayun Ahmed', cat:'Literature', icon:'icon-lit', letter:'HA', url:'https://archive.org/search?query=humayun+ahmed' },
    { title:'Himu', author:'Humayun Ahmed', cat:'Literature', icon:'icon-lit', letter:'Hi', url:'https://archive.org/search?query=himu+humayun+ahmed' },
];

function filterBooks() {
    const search=document.getElementById('searchInput').value.toLowerCase();
    const cat=document.getElementById('catFilter').value;
    const filtered=BOOKS.filter(b=>(!cat||b.cat===cat)&&(!search||b.title.toLowerCase().includes(search)||b.author.toLowerCase().includes(search)));
    renderBooks(filtered);
}

function renderBooks(list) {
    const container=document.getElementById('booksContainer');
    if (list.length===0) { container.innerHTML='<div class="no-results">No books found matching your search.</div>'; return; }

    const groups={};
    list.forEach(b=>{ if(!groups[b.cat]) groups[b.cat]=[]; groups[b.cat].push(b); });

    const catMeta={
        'CSE Core':           { sub:'Programming, OS, Database, Architecture' },
        'Data Structures':    { sub:'Algorithms, DSA, Problem Solving' },
        'Math & Logic':       { sub:'Discrete Math, Calculus, Probability, Linear Algebra' },
        'Networking':         { sub:'Network Architecture, TCP/IP, Security' },
        'AI & Machine Learning':{ sub:'Deep Learning, ML, Pattern Recognition' },
        'Software Engineering':{ sub:'Design Patterns, Best Practices, Architecture' },
        'Literature':         { sub:'Bengali & World Literature' },
    };

    container.innerHTML=Object.entries(groups).map(([cat,books])=>{
        const meta=catMeta[cat]||{ sub:'' };
        return `
        <div class="cat-header">
            <div class="cat-header-left">
                <div class="cat-title">${cat}</div>
                <div class="cat-sub">${meta.sub}</div>
            </div>
            <div class="cat-count">${books.length} books</div>
        </div>
        <div class="books-grid">
            ${books.map(b=>`
                <a href="${b.url}" target="_blank" class="book-card">
                    <div class="book-icon ${b.icon}">${b.letter}</div>
                    <div class="book-info">
                        <div class="book-title">${b.title}</div>
                        <div class="book-auth">${b.author}</div>
                    </div>
                    <div class="book-tag">Free</div>
                </a>`).join('')}
        </div>
        <div class="divider"></div>`;
    }).join('');
}

renderBooks(BOOKS);
</script>
<script src="js/navbar.js"></script>
</body>
</html>
