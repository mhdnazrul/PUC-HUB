<!DOCTYPE html>
<!-- Made by: Team PUC HUB | Internet Programming Lab Project | Ador -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUC AI Assistant — PUC HUB</title>
<link rel="icon" type="image/png" href="assets/p.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:radial-gradient(circle at top,#2b180f 0%,#0c0908 100%);color:#ececec;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

.ai-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(43,24,15,0.95);border-bottom:1px solid rgba(243,156,18,0.25);flex-shrink:0;backdrop-filter:blur(12px);}
.nav-logo-wrap{display:flex;align-items:center;gap:10px;}
.nav-logo-wrap img{width:36px;height:36px;border-radius:50%;border:2px solid #f39c12;object-fit:cover;}
.nav-brand{font-size:18px;font-weight:700;color:#f39c12;}
.nav-tag{font-size:11px;color:#e67e22;letter-spacing:1px;margin-left:4px;}
.nav-mid{flex:1;text-align:center;}
.nav-mid-title{font-size:14px;font-weight:700;color:#f39c12;}
.nav-mid-sub{font-size:11px;color:#6b5040;margin-top:1px;}
.nav-actions{display:flex;gap:8px;}
.nav-btn{padding:8px 16px;background:transparent;border:1px solid rgba(243,156,18,0.35);border-radius:8px;color:#ccc;text-decoration:none;font-size:13px;cursor:pointer;transition:.2s;font-family:'Poppins',sans-serif;}
.nav-btn:hover{border-color:#f39c12;color:#f39c12;}

.messages{flex:1;overflow-y:auto;padding:30px 0 16px;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:rgba(243,156,18,0.2);border-radius:4px;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;text-align:center;padding:20px;}
.empty-state h3{font-size:22px;color:#a08060;font-weight:700;}
.empty-state p{font-size:14px;color:#6b5040;max-width:340px;line-height:1.7;}
.msg-row{display:flex;padding:9px 24px;max-width:820px;margin:0 auto;width:100%;gap:12px;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.msg-row.user{flex-direction:row-reverse;}
.avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar.ai{background:rgba(243,156,18,0.2);border:2px solid rgba(243,156,18,0.4);}
.bubble{max-width:72%;padding:13px 17px;border-radius:14px;font-size:14px;line-height:1.8;word-break:break-word;}
.bubble.user-b{background:rgba(43,24,15,0.8);border:1px solid rgba(243,156,18,0.2);border-radius:14px 4px 14px 14px;color:#ececec;}
.bubble.ai-b{background:rgba(43,24,15,0.5);border:1px solid rgba(243,156,18,0.12);border-radius:4px 14px 14px 14px;color:#ddd;}
.bubble.ai-b pre{background:rgba(12,9,8,0.8);border:1px solid rgba(243,156,18,0.15);border-radius:9px;padding:13px;margin:11px 0;overflow-x:auto;font-size:13px;font-family:'Courier New',monospace;}
.bubble.ai-b code{background:rgba(243,156,18,0.1);padding:2px 7px;border-radius:4px;font-size:13px;font-family:'Courier New',monospace;color:#f39c12;}
.bubble.ai-b pre code{background:none;padding:0;color:#bbb;}
.typing{display:flex;align-items:center;gap:5px;padding:3px 0;}
.dot{width:7px;height:7px;background:rgba(243,156,18,0.4);border-radius:50%;animation:dotPulse 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}

.input-area{padding:14px 24px 20px;background:rgba(43,24,15,0.95);border-top:1px solid rgba(243,156,18,0.2);flex-shrink:0;}
.input-box{max-width:760px;margin:0 auto;display:flex;align-items:flex-end;gap:10px;background:rgba(12,9,8,0.8);border:1px solid rgba(243,156,18,0.2);border-radius:13px;padding:11px 14px;transition:.2s;}
.input-box:focus-within{border-color:#f39c12;box-shadow:0 0 0 3px rgba(243,156,18,0.07);}
#userInput{flex:1;background:none;border:none;outline:none;color:#ececec;font-size:15px;font-family:'Poppins',sans-serif;resize:none;max-height:130px;min-height:24px;line-height:1.6;}
#userInput::placeholder{color:#6b5040;}
.send-btn{width:40px;height:40px;background:linear-gradient(135deg,#f39c12,#e67e22);border:none;border-radius:10px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;}
.send-btn:hover:not(:disabled){opacity:.9;transform:translateY(-1px);}
.send-btn:disabled{background:rgba(43,24,15,0.8);border:1px solid rgba(243,156,18,0.15);cursor:not-allowed;}
.input-hint{text-align:center;font-size:11px;color:#6b5040;margin-top:9px;}
@media(max-width:600px){.ai-nav{padding:10px 14px;}.nav-mid-sub{display:none;}.msg-row{padding:7px 12px;}.bubble{max-width:86%;font-size:13px;}.input-area{padding:10px 12px 16px;}}
</style>
</head>
<body>

<nav class="ai-nav">
  <div class="nav-logo-wrap">
    <img src="assets/ai.png" alt="PUC" onerror="this.src='assets/p.png'">
    <span class="nav-brand">PUC HUB <span class="nav-tag">AI Assistant</span></span>
  </div>
  <div class="nav-mid">
    <div class="nav-mid-title">PUC AI Assistant</div>
    <div class="nav-mid-sub">Powered by Premier University Problem Solver Team</div>
  </div>
  <div class="nav-actions">
    <button class="nav-btn" onclick="clearChat()">Clear</button>
    <button class="nav-btn" onclick="newChat()">New Chat</button>
    <a href="index.html" class="nav-btn">Back</a>
  </div>
</nav>

<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <h3>How can I help you?</h3>
    <p>Ask me about coding, assignments, lab reports, CGPA calculations, or any university topic.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-box">
    <textarea id="userInput" placeholder="Message PUC AI..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#9654;</button>
  </div>
  <div class="input-hint">PUC AI Assistant — Premier University Problem Solver Team</div>
</div>

<script>
const SYSTEM_TEXT='You are PUC AI Assistant, a helpful academic assistant for Premier University Chittagong (PUC) students. Help with programming (C, C++, Java, Python, JavaScript), CGPA calculation, lab reports, assignments, and university topics. Be concise, friendly, and accurate. Use code blocks when sharing code. Reply in the same language the user writes in.';
let history=[{role:'system',content:SYSTEM_TEXT}];
let loading=false;

function getAPIKey() {
    let key = localStorage.getItem('groq_api_key');
    if (!key) {
        key = prompt('Enter your Groq API Key to use AI features:\n(Get a free key from console.groq.com)');
        if (key && key.trim()) {
            localStorage.setItem('groq_api_key', key.trim());
        }
    }
    return key ? key.trim() : '';
}

document.addEventListener('DOMContentLoaded',function(){
  if(localStorage.getItem('isLoggedIn')!=='true'){window.location.href='login.html';return;}
  var ta=document.getElementById('userInput');
  ta.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,130)+'px';});
  ta.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
  ta.focus();
});

async function sendMessage(){
  if(loading)return;
  var ta=document.getElementById('userInput');var text=ta.value.trim();if(!text)return;
  var empty=document.getElementById('emptyState');if(empty)empty.remove();
  addBubble('user',text);history.push({role:'user',content:text});
  ta.value='';ta.style.height='auto';
  loading=true;document.getElementById('sendBtn').disabled=true;var typingId=showTyping();

  const API_KEY = getAPIKey();
  if (!API_KEY) {
    removeTyping(typingId);
    history.pop();
    addBubble('ai','Please provide a valid Groq API key to use the AI assistant.');
    loading=false;document.getElementById('sendBtn').disabled=false;
    return;
  }

  try{
    var res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:history,max_tokens:1500,temperature:0.7})});
    removeTyping(typingId);
    if(!res.ok){
      if(res.status===401){ localStorage.removeItem('groq_api_key'); throw new Error('Invalid API key. Please refresh and enter a valid Groq key.'); }
      var errData=await res.json().catch(function(){return{};});throw new Error(errData.error?errData.error.message:'Error '+res.status);
    }
    var data=await res.json();var reply='';
    if(data.choices&&data.choices[0]&&data.choices[0].message)reply=data.choices[0].message.content;
    if(!reply)reply='Sorry, I could not generate a response. Please try again.';
    history.push({role:'assistant',content:reply});addBubble('ai',reply);
  }catch(err){
    removeTyping(typingId);history.pop();
    var msg=err.message;
    if(msg.indexOf('429')!==-1)msg='Too many requests. Please wait a moment.';
    else if(msg.indexOf('Failed to fetch')!==-1)msg='Network error. Check your internet connection.';
    addBubble('ai','Error: '+msg);
  }
  loading=false;document.getElementById('sendBtn').disabled=false;document.getElementById('userInput').focus();
}

function addBubble(role,text){
  var area=document.getElementById('messages');
  var userImg='assets/p.png';
  try{var ud=JSON.parse(localStorage.getItem('userData'));if(ud&&ud.profileImage)userImg=ud.profileImage;}catch(e){}
  var row=document.createElement('div');row.className='msg-row'+(role==='user'?' user':'');
  var avatarHtml=role==='user'?'<div class="avatar"><img src="'+userImg+'" onerror="this.parentElement.innerHTML=\'&#128100;\'" alt="You"></div>':'<div class="avatar ai">&#129302;</div>';
  var content=role==='ai'?formatText(text):escHtml(text);
  row.innerHTML=avatarHtml+'<div class="bubble '+(role==='user'?'user-b':'ai-b')+'">'+content+'</div>';
  area.appendChild(row);area.scrollTop=area.scrollHeight;
}
function formatText(t){t=t.replace(/```[\w]*\n?([\s\S]*?)```/g,function(_,code){return'<pre><code>'+escHtml(code.trim())+'</code></pre>';});t=t.replace(/`([^`\n]+)`/g,'<code>$1</code>');t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');t=t.replace(/\n/g,'<br>');return t;}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showTyping(){var area=document.getElementById('messages');var id='typ_'+Date.now();var row=document.createElement('div');row.className='msg-row';row.id=id;row.innerHTML='<div class="avatar ai">&#129302;</div><div class="bubble ai-b"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';area.appendChild(row);area.scrollTop=area.scrollHeight;return id;}
function removeTyping(id){var el=document.getElementById(id);if(el)el.remove();}
function newChat(){if(history.length<=1)return;if(!confirm('Start a new chat? Current conversation will be cleared.'))return;resetChat();}
function clearChat(){if(history.length<=1)return;if(!confirm('Clear this conversation?'))return;resetChat();}
function resetChat(){history=[{role:'system',content:SYSTEM_TEXT}];document.getElementById('messages').innerHTML='<div class="empty-state" id="emptyState"><h3>How can I help you?</h3><p>Ask me about coding, assignments, CGPA calculations, lab reports, or any university topic.</p></div>';}
</script>
</body>
</html>
