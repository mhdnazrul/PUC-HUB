<!DOCTYPE html>
<!-- Made by: Team PUC HUB | Internet Programming Lab Project | Ador -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Contact — PUC HUB</title>
    <link rel="icon" type="image/png" href="assets/p.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Poppins',sans-serif;background:radial-gradient(circle at top,#2b180f 0%,#0c0908 100%);background-attachment:fixed;color:#ececec;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

        /* ── NAVBAR ── */
        .ai-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(43,24,15,0.95);border-bottom:1px solid rgba(243,156,18,0.25);flex-shrink:0;backdrop-filter:blur(12px);}
        .nav-logo-wrap{display:flex;align-items:center;gap:10px;}
        .nav-logo-wrap img{width:36px;height:36px;border-radius:50%;border:2px solid #f39c12;object-fit:cover;}
        .nav-brand{font-size:18px;font-weight:700;color:#f39c12;}
        .nav-tag{font-size:11px;color:#e67e22;letter-spacing:1px;margin-left:4px;}
        .nav-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
        .nav-btn{padding:8px 16px;background:transparent;border:1px solid rgba(243,156,18,0.35);border-radius:8px;color:#ccc;text-decoration:none;font-size:13px;cursor:pointer;transition:.2s;font-family:'Poppins',sans-serif;display:inline-flex;align-items:center;gap:5px;}
        .nav-btn:hover{border-color:#f39c12;color:#f39c12;}
        .nav-btn-dl{background:rgba(243,156,18,0.1);border:1px solid rgba(243,156,18,0.3);color:#f39c12;}
        .nav-btn-dl:hover{background:rgba(243,156,18,0.2);}

        /* TAB BUTTONS */
        .tab-bar{display:flex;gap:0;background:rgba(43,24,15,0.8);border-bottom:1px solid rgba(243,156,18,0.15);flex-shrink:0;}
        .tab-btn{flex:1;padding:13px;text-align:center;font-size:14px;font-family:'Poppins',sans-serif;cursor:pointer;color:#a08060;background:none;border:none;border-bottom:3px solid transparent;transition:.2s;font-weight:600;}
        .tab-btn.active{color:#f39c12;border-bottom-color:#f39c12;}
        .tab-btn:hover{color:#f39c12;}

        /* PDF AREA */
        .pdf-wrap{flex:1;overflow:hidden;}
        .pdf-panel{width:100%;height:100%;display:none;}
        .pdf-panel.active{display:block;}
        .pdf-panel iframe{width:100%;height:100%;border:none;}

        /* Fallback */
        .fallback{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;text-align:center;padding:24px;}
        .fallback .icon{font-size:56px;}
        .fallback h3{font-size:18px;color:#f39c12;}
        .fallback p{color:#a08060;font-size:14px;max-width:320px;line-height:1.7;}
        .btn-dl{padding:11px 24px;background:linear-gradient(135deg,#f39c12,#e67e22);color:#000;border:none;border-radius:10px;font-size:14px;font-family:'Poppins',sans-serif;font-weight:700;cursor:pointer;text-decoration:none;transition:.2s;margin-bottom:8px;}
        .btn-dl:hover{opacity:.9;}

        @media(max-width:600px){.ai-nav{padding:10px 14px;}.nav-tag{display:none;}}
    </style>
</head>
<body>

<nav id="puc-navbar"></nav>

<div class="tab-bar" id="tabBar">
    <button class="tab-btn active" onclick="switchTab('teacher',this)">📋 Teacher List</button>
    <button class="tab-btn" onclick="switchTab('sear',this)">📄 CR</button>
</div>

<div class="pdf-wrap" id="pdfWrap">
    <div class="pdf-panel active" id="panel-teacher">
        <iframe src="assets/teacher.pdf#zoom=50"></iframe>
    </div>
    <div class="pdf-panel" id="panel-sear">
        <iframe src="assets/cr.pdf#zoom=40"></iframe>
    </div>
</div>

<div class="fallback" id="fallback">
    <div class="icon">👤</div>
    <h3>Faculty Contact</h3>
    <p>PDF viewer is not available on mobile. Please download the files below.</p>
    <a href="assets/teacher.pdf" download class="btn-dl">⬇ Download Teacher List</a>
    <a href="assets/cr.pdf" download class="btn-dl">⬇ Download CR</a>
</div>

<script>
if(localStorage.getItem('isLoggedIn')!=='true'){window.location.href='login.html';}
if(/Android|iPhone|iPad/i.test(navigator.userAgent)){
    document.getElementById('pdfWrap').style.display='none';
    document.getElementById('tabBar').style.display='none';
    document.getElementById('fallback').style.display='flex';
}
function switchTab(name,btn){
    document.querySelectorAll('.pdf-panel').forEach(function(p){p.classList.remove('active');});
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
    document.getElementById('panel-'+name).classList.add('active');
    btn.classList.add('active');
}
if(typeof trackUserActivity==='function'){trackUserActivity('Faculty Contact');}
</script>
<script src="js/auth.js"></script>
<script src="js/routes.js"></script>
<script src="js/tracker.js"></script>
<script src="js/app.js"></script>
<script src="js/navbar.js"></script>
</body>
</html>
