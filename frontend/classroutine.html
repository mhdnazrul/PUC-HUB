<!DOCTYPE html>
<!-- Made by: Team PUC HUB | Internet Programming Lab Project | Alvi -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Routine — PUC HUB</title>
    <link rel="icon" type="image/png" href="assets/p.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Poppins',sans-serif;background:radial-gradient(circle at top,#2b180f 0%,#0c0908 100%);background-attachment:fixed;color:#ececec;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

        /* ── NAVBAR ── */
        .ai-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(43,24,15,0.95);border-bottom:1px solid rgba(243,156,18,0.25);flex-shrink:0;backdrop-filter:blur(12px);}
        .nav-logo-wrap{display:flex;align-items:center;gap:10px;}
        .nav-logo-wrap img{width:36px;height:36px;border-radius:50%;border:2px solid #f39c12;object-fit:cover;}
        .nav-brand{font-size:18px;font-weight:700;color:#f39c12;}
        .nav-tag{font-size:11px;color:#e67e22;letter-spacing:1px;margin-left:4px;}
        .nav-actions{display:flex;gap:8px;align-items:center;}
        .nav-btn{padding:8px 16px;background:transparent;border:1px solid rgba(243,156,18,0.35);border-radius:8px;color:#ccc;text-decoration:none;font-size:13px;cursor:pointer;transition:.2s;font-family:'Poppins',sans-serif;display:inline-flex;align-items:center;gap:5px;}
        .nav-btn:hover{border-color:#f39c12;color:#f39c12;}
        .nav-btn-dl{background:rgba(243,156,18,0.1);border:1px solid rgba(243,156,18,0.3);color:#f39c12;}
        .nav-btn-dl:hover{background:rgba(243,156,18,0.2);}

        /* PDF VIEWER */
        .pdf-container{flex:1;width:100%;overflow:hidden;}
        .pdf-container iframe{width:100%;height:100%;border:none;}

        /* Fallback */
        .fallback{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;text-align:center;padding:24px;}
        .fallback .icon{font-size:56px;}
        .fallback h3{font-size:20px;color:#f39c12;}
        .fallback p{color:#a08060;font-size:14px;max-width:340px;line-height:1.7;}
        .btn-dl{padding:12px 28px;background:linear-gradient(135deg,#f39c12,#e67e22);color:#000;border:none;border-radius:10px;font-size:15px;font-family:'Poppins',sans-serif;font-weight:700;cursor:pointer;text-decoration:none;transition:.2s;}
        .btn-dl:hover{opacity:.9;}

        @media(max-width:600px){.ai-nav{padding:10px 14px;}.nav-tag{display:none;}}
    </style>
</head>
<body>

<nav class="ai-nav">
    <div class="nav-logo-wrap">
        <img src="assets/p.png" alt="PUC" onerror="this.style.display='none'">
        <span class="nav-brand">PUC HUB <span class="nav-tag">Class Routine</span></span>
    </div>
    <div class="nav-actions">
        <a href="assets/class.pdf" download="class_routine.pdf" class="nav-btn nav-btn-dl">⬇ Download</a>
        <a href="index.html" class="nav-btn">Home</a>
        <a href="index.html#services" class="nav-btn">Services</a>
        <button onclick="window.location.href='index.html#general'" class="nav-btn">Back</button>
    </div>
</nav>

<div class="pdf-container" id="pdfContainer">
    <iframe src="assets/class.pdf#zoom=75" id="pdfFrame" title="Class Routine"></iframe>
</div>

<div class="fallback" id="fallback">
    <div class="icon">📅</div>
    <h3>Class Routine</h3>
    <p>PDF viewer is not available on your device. Please download to view.</p>
    <a href="assets/class.pdf" download="class_routine.pdf" class="btn-dl">⬇ Download Class Routine</a>
</div>

<script>
if(localStorage.getItem('isLoggedIn')!=='true'){window.location.href='login.html';}
if(/Android|iPhone|iPad/i.test(navigator.userAgent)){
    document.getElementById('pdfContainer').style.display='none';
    document.getElementById('fallback').style.display='flex';
}
document.getElementById('pdfFrame').addEventListener('error',function(){
    document.getElementById('pdfContainer').style.display='none';
    document.getElementById('fallback').style.display='flex';
});
if(typeof trackUserActivity==='function'){trackUserActivity('Class Routine');}
</script>
<script src="js/auth.js"></script>
<script src="js/routes.js"></script>
<script src="js/tracker.js"></script>
<script src="js/app.js"></script>
</body>
</html>
